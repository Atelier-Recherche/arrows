name: Obsidian plugin release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify artefacts
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css
          test -f versions.json
          test -f arrows-release-notes.md

      - name: Create GitHub release (latest)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body_path: arrows-release-notes.md
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
